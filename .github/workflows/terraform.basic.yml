name: Terraform Basic Workflow

on: 
    pull_request:
      branches:
        - main

permissions:
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest

    env:
      TF_VAR_app_api_key: ${{ secrets.APP_API_KEY }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Confirm secret is available safely
      run: |
        if [ -z "$TF_VAR_app_api_key" ]; then
          echo "APP_API_KEY secret is missing."
          exit 1
        fi

        echo "APP_API_KEY secret is configured."
        echo "Secret length: ${#TF_VAR_app_api_key}"

    - name: Check Terraform formatting
      run: terraform fmt -check -recursive

    - name: intitialize Terraform
      run: terraform init

    - name: Validate terraform configuration
      run: terraform validate

    - name: Create Terraform plan file
      run: terraform plan -out=tfplan

    - name: Convert plan to readable text
      run: terraform show -no-color tfplan > tfplan.txt

    - name: Upload Terraform plan artifact
      uses: actions/upload-artifact@v4
      with:
          name: terraform-plan
          path: tfplan.txt